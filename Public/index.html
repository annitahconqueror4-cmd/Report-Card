<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Report Card System with MySQL</title>
    <style>
        /* All your previous CSS styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0b2b4a;
            margin-bottom: 25px;
            border-bottom: 3px solid #eef2f7;
            padding-bottom: 15px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: 600;
            font-size: 14px;
            color: #1e3a5f;
            display: block;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #dce4ec;
            border-radius: 12px;
            font-size: 14px;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2a6fdb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(42,111,219,0.15);
        }
        .photo-upload, .logo-upload {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .photo-preview, .logo-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eef2f7;
            border: 3px solid #dce4ec;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            overflow: hidden;
        }
        .logo-preview {
            border-radius: 16px;
            width: 70px;
            height: 70px;
        }
        .photo-preview img, .logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .subject-row {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 10px;
            margin-bottom: 8px;
            background: #f8fafd;
            padding: 8px 12px;
            border-radius: 12px;
            align-items: center;
        }
        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: #143048;
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            color: #1e3a5f;
            border: 2px solid #dce4ec;
        }
        .btn-outline:hover {
            background: #eef2f7;
        }
        .btn-success {
            background: #0f7b3e;
        }
        .btn-success:hover {
            background: #0b642f;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #b02a37;
        }
        .report-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e6edf5;
            margin-top: 30px;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #0b2b4a;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .school-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .student-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8fafd;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            background: #f9fcff;
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .marks-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .marks-table th {
            background: #e8eff8;
            padding: 10px;
            text-align: left;
        }
        .marks-table td {
            padding: 10px;
            border-bottom: 1px solid #e6edf5;
        }
        .totals-row {
            background: #f2f7ff;
            font-weight: 600;
        }
        .grade-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 700;
            background: #d4e2fc;
        }
        .position-badge {
            background: #0b2b4a;
            color: white;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: 600;
            display: inline-block;
        }
        .remarks-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            border-top: 2px dashed #dce4ec;
            padding-top: 20px;
        }
        .remark-box {
            background: #f8fafd;
            padding: 12px 16px;
            border-radius: 14px;
        }
        .student-list {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafd;
            border-radius: 12px;
        }
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e6edf5;
        }
        .student-item:last-child {
            border-bottom: none;
        }
        .hidden {
            display: none !important;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
            justify-content: center;
        }
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .report-card { border: 1px solid #ddd; }
        }
        @media (max-width: 700px) {
            .grid-2 { grid-template-columns: 1fr; }
            .details-grid { grid-template-columns: 1fr; }
            .remarks-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Report Card System </h1>
        
        <!-- Student List -->
        <div class="no-print" style="margin-bottom:20px;">
            <div class="flex-between">
                <h3>📚 Saved Students</h3>
                <button class="btn btn-success" onclick="loadStudents()">🔄 Refresh List</button>
            </div>
            <div id="studentList" class="student-list">
                <p>Loading students...</p>
            </div>
        </div>
        
        <!-- Input Form -->
        <div class="grid-2 no-print">
            <!-- Left Column -->
            <div>
                <div class="form-group">
                    <label>📸 Student Photo</label>
                    <div class="photo-upload">
                        <div class="photo-preview" id="photoPreview">🧑‍🎓</div>
                        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(this)" />
                    </div>
                </div>
                <div class="form-group">
                    <label>🏫 School Logo</label>
                    <div class="logo-upload">
                        <div class="logo-preview" id="logoPreview">🏛️</div>
                        <input type="file" id="logoInput" accept="image/*" onchange="handleLogoUpload(this)" />
                    </div>
                </div>
                <div class="form-group">
                    <label>School Name</label>
                    <input type="text" id="schoolName" value="Royalty High School" />
                </div>
                <div class="form-group">
                    <label>Student Name</label>
                    <input type="text" id="studentName" value="Aarav Sharma" />
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" id="studentClass" value="10-A" />
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" id="rollNumber" value="24" />
                </div>
                <div class="form-group">
                    <label>👩‍🏫 Teacher's Remark</label>
                    <textarea id="teacherRemark" rows="2">Shows consistent effort and improvement.</textarea>
                </div>
                <div class="form-group">
                    <label>👨‍🏫 Head Teacher's Remark</label>
                    <textarea id="headTeacherRemark" rows="2">A diligent student with good conduct.</textarea>
                </div>
                <div class="form-group">
                    <label>📅 Next Term Begins</label>
                    <input type="text" id="nextTermDate" placeholder="e.g. Monday, 15th September 2026" />
                </div>
            </div>
            
            <!-- Right Column -->
            <div>
                <div class="flex-between" style="margin-bottom:12px;">
                    <label style="margin:0;">📚 Subjects & Marks</label>
                    <button class="btn btn-outline" onclick="addSubject()" style="padding:6px 16px; font-size:12px;">+ Add</button>
                </div>
                <div id="subjectContainer"></div>
                
                <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
                    <button class="btn btn-success" onclick="saveStudent()">💾 Save to Database</button>
                    <button class="btn" onclick="generateReport()">👁️ Preview Report</button>
                    <button class="btn btn-outline" onclick="resetForm()">↺ Reset</button>
                    <input type="hidden" id="editStudentId" value="" />
                </div>
            </div>
        </div>
        
        <!-- Report Card -->
        <div id="reportCardContainer" class="report-card hidden">
            <div id="reportContent"></div>
            <div class="card-actions no-print">
                <button class="btn" onclick="window.print()">🖨️ Print / PDF</button>
                <button class="btn btn-outline" onclick="hideReport()">✏️ Edit</button>
            </div>
        </div>
    </div>

  <script src="script.js"></script>
</body>
</html>
